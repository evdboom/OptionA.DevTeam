name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ./DevTeam.slnx

      - name: Build
        run: dotnet build ./DevTeam.slnx --configuration Release --no-restore

  unit-tests:
    name: Unit Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ./DevTeam.slnx

      - name: Build
        run: dotnet build ./DevTeam.slnx --configuration Release --no-restore

      - name: Run unit tests
        run: dotnet run --project ./tests/DevTeam.UnitTests/DevTeam.UnitTests.csproj --configuration Release --no-build

  shell-tests:
    name: Shell Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ./DevTeam.slnx

      - name: Build
        run: dotnet build ./DevTeam.slnx --configuration Release --no-restore

      - name: Run shell tests
        run: dotnet run --project ./tests/DevTeam.ShellTests/DevTeam.ShellTests.csproj --configuration Release --no-build

  tui-tests:
    name: TUI E2E Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tests/DevTeam.TuiTests/package-lock.json

      - name: Install tui-test dependencies
        run: npm ci
        working-directory: tests/DevTeam.TuiTests

      - name: Run TUI e2e tests
        # npm pretest runs 'dotnet build' (restore + compile) before tui-test starts,
        # so all --no-build test invocations share one build and run immediately.
        run: npm test
        working-directory: tests/DevTeam.TuiTests
        env:
          # Ensure dotnet is on PATH for the tui-test process spawner
          DOTNET_ROOT: ${{ env.DOTNET_ROOT }}
