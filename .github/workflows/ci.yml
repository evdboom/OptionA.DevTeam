name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ./DevTeam.slnx

      - name: Build
        run: dotnet build ./DevTeam.slnx --configuration Release --no-restore

  unit-tests:
    name: Unit Tests
    needs: build
    runs-on: ubuntu-latest
    env:
      COVERAGE_THRESHOLD_LINE: 50
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ./DevTeam.slnx

      - name: Build
        run: dotnet build ./DevTeam.slnx --configuration Release --no-restore

      - name: Install coverlet console
        run: dotnet tool install --global coverlet.console

      - name: Run unit, shell, and smoke tests with combined coverage
        run: |
          $env:PATH = "$env:PATH:$HOME/.dotnet/tools"

          $coverageJson = "./artifacts/coverage/combined/coverage.json"
          $coverageBase = "./artifacts/coverage/combined/coverage"
          New-Item -ItemType Directory -Path "./artifacts/coverage/combined" -Force | Out-Null

          coverlet ./tests/DevTeam.UnitTests/bin/Release/net10.0/DevTeam.UnitTests.dll `
            --target "./tests/DevTeam.UnitTests/bin/Release/net10.0/DevTeam.UnitTests" `
            --format "json" `
            --output $coverageJson `
            --include "[DevTeam.Core]*" `
            --include "[DevTeam.Cli]*"

          coverlet ./tests/DevTeam.ShellTests/bin/Release/net10.0/DevTeam.ShellTests.dll `
            --target "./tests/DevTeam.ShellTests/bin/Release/net10.0/DevTeam.ShellTests" `
            --format "json" `
            --output $coverageJson `
            --merge-with $coverageJson `
            --include "[DevTeam.Core]*" `
            --include "[DevTeam.Cli]*"

          coverlet ./tests/DevTeam.SmokeTests/bin/Release/net10.0/DevTeam.SmokeTests.dll `
            --target "./tests/DevTeam.SmokeTests/bin/Release/net10.0/DevTeam.SmokeTests" `
            --format "json" `
            --format "cobertura" `
            --output $coverageBase `
            --merge-with $coverageJson `
            --include "[DevTeam.Core]*" `
            --include "[DevTeam.Cli]*" `
            --threshold $env:COVERAGE_THRESHOLD_LINE `
            --threshold-type "line" `
            --threshold-stat "total"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: combined-test-coverage
          path: artifacts/coverage/combined/coverage.cobertura.xml
          if-no-files-found: error

  shell-tests:
    name: Shell Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ./DevTeam.slnx

      - name: Build
        run: dotnet build ./DevTeam.slnx --configuration Release --no-restore

      - name: Run shell tests
        run: dotnet run --project ./tests/DevTeam.ShellTests/DevTeam.ShellTests.csproj --configuration Release --no-build

  tui-tests:
    name: TUI E2E Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tests/DevTeam.TuiTests/package-lock.json

      - name: Install tui-test dependencies
        run: npm ci
        working-directory: tests/DevTeam.TuiTests

      - name: Run TUI e2e tests
        # npm pretest runs 'dotnet build' (restore + compile) before tui-test starts,
        # so all --no-build test invocations share one build and run immediately.
        run: npm test
        working-directory: tests/DevTeam.TuiTests
        env:
          # Ensure dotnet is on PATH for the tui-test process spawner
          DOTNET_ROOT: ${{ env.DOTNET_ROOT }}
