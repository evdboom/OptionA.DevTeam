name: Publish NuGet tool

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # needed to create a GitHub release

defaults:
  run:
    shell: pwsh

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      PACKAGE_OUTPUT: ./nupkg
      TOOL_PROJECT: ./src/DevTeam.Cli/DevTeam.Cli.csproj
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version from tag
        id: version
        run: |
          $tag = "${{ github.ref_name }}"          # e.g. v0.5.40
          $ver = $tag.TrimStart('v')               # e.g. 0.5.40
          Write-Host "Tag: $tag  →  Version: $ver"
          "value=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ./DevTeam.slnx

      - name: Build
        run: dotnet build ./DevTeam.slnx --configuration Release --no-restore /p:Version=${{ steps.version.outputs.value }}

      - name: Run smoke tests
        run: dotnet run --project ./tests/DevTeam.SmokeTests/DevTeam.SmokeTests.csproj --configuration Release --no-build

      - name: Pack tool
        run: |
          New-Item -ItemType Directory -Force -Path $env:PACKAGE_OUTPUT | Out-Null
          dotnet pack $env:TOOL_PROJECT --configuration Release --no-build --output $env:PACKAGE_OUTPUT /p:Version=${{ steps.version.outputs.value }}

      - name: Publish to NuGet
        run: |
          Get-ChildItem -Path $env:PACKAGE_OUTPUT -Filter *.nupkg | ForEach-Object {
            Write-Host "Publishing $($_.Name)"
            $output = dotnet nuget push $_.FullName --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate 2>&1
            $exitCode = $LASTEXITCODE
            Write-Host $output
            if ($output -match 'already exists') {
              Write-Host "::warning::Package $($_.Name) already exists on NuGet — skipped."
            }
            elseif ($exitCode -ne 0) {
              throw "dotnet nuget push failed for $($_.Name) with exit code $exitCode."
            }
          }

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $packages = Get-ChildItem -Path $env:PACKAGE_OUTPUT -Filter *.nupkg | Select-Object -ExpandProperty FullName

          if (-not $packages) {
            throw "No .nupkg files found in $env:PACKAGE_OUTPUT."
          }

          $releaseViewOutput = gh release view $tag 2>&1
          $releaseViewExitCode = $LASTEXITCODE
          if ($releaseViewExitCode -eq 0) {
            Write-Host "GitHub release $tag already exists. Uploading assets with replacement enabled."
          }
          else {
            Write-Host "gh release view for $tag returned exit code $releaseViewExitCode. Attempting to create release."
            Write-Host "Creating GitHub release $tag."
            $releaseCreateOutput = gh release create $tag `
              --title "DevTeam $tag" `
              --generate-notes 2>&1
            $releaseCreateExitCode = $LASTEXITCODE

            if ($releaseCreateExitCode -ne 0) {
              throw "Failed to create GitHub release $tag. gh output: $releaseCreateOutput"
            }
          }

          foreach ($package in $packages) {
            Write-Host "Uploading release asset $(Split-Path $package -Leaf)"
            $uploadOutput = gh release upload $tag $package --clobber 2>&1
            $uploadExitCode = $LASTEXITCODE

            if ($uploadExitCode -ne 0) {
              throw "Failed to upload release asset $(Split-Path $package -Leaf) to $tag. gh output: $uploadOutput"
            }
          }
